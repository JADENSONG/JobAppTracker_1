services:
  - type: web
    name: job-app-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: SHEET_ID
        sync: false
      - key: SHEET_TAB
        value: Sheet1
      - key: APP_PASSWORD
        sync: false
